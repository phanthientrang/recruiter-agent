<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,.12);
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h1 {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
    }

    .header-info .status {
      color: rgba(255,255,255,.8);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    /* ── Messages area ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* ── Message rows ── */
    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeUp .2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user  { align-self: flex-end; align-items: flex-end; }
    .message-row.agent { align-self: flex-start; align-items: flex-start; }
    .message-row.error { align-self: flex-start; align-items: flex-start; }

    /* Group spacing — consecutive same-sender messages get less gap */
    .message-row + .message-row.user  { margin-top: 2px; }
    .message-row + .message-row.agent { margin-top: 2px; }
    .message-row.user  + .message-row.agent,
    .message-row.agent + .message-row.user  { margin-top: 14px; }
    .message-row.error + .message-row,
    .message-row       + .message-row.error { margin-top: 14px; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-row.user  .bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-row.agent .bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e7eb;
    }

    .message-row.error .bubble {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 10.5px;
      color: #9ca3af;
      margin-top: 3px;
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing-row {
      display: flex;
      align-self: flex-start;
      margin-top: 14px;
      animation: fadeUp .2s ease;
    }

    .typing-bubble {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      resize: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 22px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 14.5px;
      color: #111827;
      outline: none;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color .15s;
      background: #f9fafb;
    }

    #input:focus { border-color: #667eea; background: #fff; }
    #input:disabled { opacity: .6; cursor: not-allowed; }
    #input::placeholder { color: #9ca3af; }

    #send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }

    #send:hover:not(:disabled) { opacity: .9; transform: scale(1.05); }
    #send:active:not(:disabled) { transform: scale(.95); }
    #send:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    #send svg { width: 18px; height: 18px; }

    /* ── Responsive ── */
    @media (min-width: 801px) {
      body { padding: 20px; }
      .chat-container { height: calc(100dvh - 40px); border-radius: 16px; overflow: hidden; }
    }
  </style>
</head>
<body>
<div class="chat-container">

  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Recruiter Assistant</h1>
      <div class="status">
        <span class="status-dot"></span>
        Online
      </div>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <textarea id="input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  const ENDPOINT = "https://endpoint-8c052130-5efa-49bd-92b9-a38678d2db75.agentbase-runtime.aiplatform.vngcloud.vn/invocations";

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send");

  let busy = false;
  let typingEl = null;

  // ── Helpers ──────────────────────────────────────────────────────────────

  function now() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function appendMessage(role, text) {
    const row = document.createElement("div");
    row.className = `message-row ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = now();

    row.appendChild(bubble);
    row.appendChild(ts);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function showTyping() {
    typingEl = document.createElement("div");
    typingEl.className = "typing-row";
    typingEl.innerHTML = `
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>`;
    messagesEl.appendChild(typingEl);
    scrollToBottom();
  }

  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setDisabled(state) {
    busy = state;
    inputEl.disabled = state;
    sendBtn.disabled = state;
  }

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  // ── Send ─────────────────────────────────────────────────────────────────

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    appendMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    setDisabled(true);
    showTyping();

    try {
      const res = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      if (!res.ok) {
        const err = await res.text().catch(() => "");
        throw new Error(`HTTP ${res.status}${err ? ": " + err : ""}`);
      }

      const data = await res.json();
      hideTyping();
      const reply = data.response ?? data.message ?? JSON.stringify(data);
      appendMessage("agent", reply);

    } catch (e) {
      hideTyping();
      appendMessage("error", "Could not reach the agent. Please try again.\n(" + e.message + ")");
    } finally {
      setDisabled(false);
      inputEl.focus();
    }
  }

  // Enter = send, Shift+Enter = newline
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ── Welcome message ───────────────────────────────────────────────────────
  appendMessage("agent",
    "Hi! I'm your Recruiter Assistant. I can help you:\n" +
    "• Create job folders  📁\n" +
    "• Process CV files and add candidates to the database  📄\n" +
    "• Sync your database with the team  🔄\n\n" +
    "What would you like to do today?"
  );

  inputEl.focus();
</script>
</body>
</html>
